{{/* Page Under Review - shown when content has not been reviewed */}}
<section class="section page-under-review">
    <div class="container">
        <div class="content has-text-centered">
            <div class="review-icon">
                <i class="fas fa-clock fa-4x"></i>
            </div>
            <h1 class="title is-2">Page Under Review</h1>
            <p class="subtitle is-4">This content is currently being reviewed and will be available soon.</p>
            <p class="has-text-grey">Our team is ensuring this content meets our quality standards.</p>
            <div class="buttons is-centered mt-5">
                <a href="{{ "/" | absURL }}" class="button is-primary is-medium">
                    <span class="icon"><i class="fas fa-home"></i></span>
                    <span>Return Home</span>
                </a>
                <a href="{{ absURL "blog/" }}" class="button is-light is-medium">
                    <span class="icon"><i class="fas fa-book"></i></span>
                    <span>Browse Blog</span>
                </a>
            </div>
        </div>
    </div>
</section>
