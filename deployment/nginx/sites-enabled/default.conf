# Rate limiting zone for API endpoints (10 requests per second per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Enable charset
    charset utf-8;

    # Security - disable nginx version in headers
    server_tokens off;

    # ==========================================================================
    # Security Headers
    # ==========================================================================

    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filter (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy - send origin only for cross-origin requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy - restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Content Security Policy - allow self, inline styles/scripts (required by Hugo), and YouTube embeds
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self'; base-uri 'self'; form-action 'self';" always;

    # ==========================================================================
    # Legacy URL Redirects (301 Permanent)
    # Redirects from old kartoza.com URL patterns to new structure
    # ==========================================================================

    # Old news/blog patterns
    rewrite ^/news/?$ /blog/ permanent;
    rewrite ^/news/(.*)$ /blog/$1 permanent;

    # Old team patterns
    rewrite ^/our-team/?$ /the_team/ permanent;
    rewrite ^/our-team/(.*)$ /the_team/$1 permanent;
    rewrite ^/team/?$ /the_team/ permanent;
    rewrite ^/team/(.*)$ /the_team/$1 permanent;
    rewrite ^/team-members/?$ /the_team/ permanent;
    rewrite ^/team-members/(.*)$ /the_team/$1 permanent;
    rewrite ^/people/?$ /the_team/ permanent;
    rewrite ^/people/(.*)$ /the_team/$1 permanent;

    # Old services/solutions patterns
    rewrite ^/services/?$ /solutions/ permanent;
    rewrite ^/services/(.*)$ /solutions/$1 permanent;

    # Old projects/portfolio patterns
    rewrite ^/projects/?$ /portfolio/ permanent;
    rewrite ^/projects/(.*)$ /portfolio/$1 permanent;
    rewrite ^/case-studies/?$ /portfolio/ permanent;
    rewrite ^/case-studies/(.*)$ /portfolio/$1 permanent;

    # Old training patterns
    rewrite ^/training/?$ /training-courses/ permanent;
    rewrite ^/training/(.*)$ /training-courses/$1 permanent;
    rewrite ^/gis-training/?$ /training-courses/ permanent;
    rewrite ^/gis-training/(.*)$ /training-courses/$1 permanent;
    rewrite ^/courses/?$ /training-courses/ permanent;
    rewrite ^/courses/(.*)$ /training-courses/$1 permanent;

    # Old company/about patterns
    rewrite ^/company/?$ /about/ permanent;
    rewrite ^/company/(.*)$ /about/$1 permanent;

    # Old contact patterns
    rewrite ^/contact/?$ /contact-us/ permanent;

    # Old maps/gallery patterns
    rewrite ^/maps/?$ /gallery/ permanent;
    rewrite ^/maps/(.*)$ /gallery/$1 permanent;

    # Old jobs patterns
    rewrite ^/jobs/?$ /careers/ permanent;
    rewrite ^/jobs/(.*)$ /careers/$1 permanent;

    # ==========================================================================

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Contact form API proxy to ERPNext
    location /api/contact {
        # Rate limiting - burst of 5 requests, then enforce limit
        limit_req zone=api_limit burst=5 nodelay;
        limit_req_status 429;

        # Only allow POST requests
        limit_except POST {
            deny all;
        }

        # Proxy to ERPNext API
        proxy_pass https://api.do.kartoza.com/erpnext/kartoza;
        proxy_http_version 1.1;
        proxy_set_header Host api.do.kartoza.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type application/json;

        # API authentication - credentials injected from environment variables
        proxy_set_header Authorization "token ${ERPNEXT_API_KEY}:${ERPNEXT_API_SECRET}";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Don't buffer the response
        proxy_buffering off;

        # CORS headers - restrict to kartoza.com domains only
        set $cors_origin "";
        if ($http_origin ~* "^https?://(www\.)?kartoza\.com$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^https?://localhost") {
            set $cors_origin $http_origin;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Main location block
    location / {
        try_files $uri $uri/ /index.html =404;

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Cache HTML files for a shorter period
        location ~* \.(html|htm)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Custom 50x page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # robots.txt
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # favicon.ico
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
