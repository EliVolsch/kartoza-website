name: 📊 Daily Stats Update

on:
  schedule:
    # Run at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          pip install requests pyyaml tabulate

      - name: 📊 Update Docker stats
        run: python3 scripts/update-docker-stats.py
        continue-on-error: true

      - name: 📊 Update Plugin stats
        run: python3 scripts/update-plugin-stats.py
        continue-on-error: true

      - name: 🔍 Check for changes
        id: git-check
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 📝 Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "chore: update Docker and plugin stats

          Automated daily update of download statistics from Docker Hub and QGIS Plugin Repository."
          git push
