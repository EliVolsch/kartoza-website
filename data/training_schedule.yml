# Group discount tiers
group_discounts:
  - min_attendees: 3
    max_attendees: 5
    discount_percent: 10
    label: "Small Team"
  - min_attendees: 6
    max_attendees: 10
    discount_percent: 15
    label: "Team"
  - min_attendees: 11
    max_attendees: 20
    discount_percent: 20
    label: "Large Team"
  - min_attendees: 21
    max_attendees: null
    discount_percent: 25
    label: "Enterprise"

# Early bird discount (days before course start)
early_bird:
  days_before: 30
  discount_percent: 10

# API configuration for e-commerce integration
api:
  base_url: "https://kartoza.com/api/v1"
  endpoints:
    check_availability: "/training/sessions/{session_id}/availability"
    create_booking: "/training/bookings"
    get_pricing: "/training/pricing/{course_slug}"
